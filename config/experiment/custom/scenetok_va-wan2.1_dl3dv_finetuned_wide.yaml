# @package _global_
#
# va-wan2.1: context = VA-VAE, target video decoder = Wan2.1 VAE (16ch, spatial 8x)
# instead of Wan2.2 (48ch, 16x). Derived from scenetok_va-wan_shift4_dl3dv_finetuned_wide.
# At target 256x448 the Wan2.1 latent is 16ch @ 32x56 (vs Wan2.2 48ch @ 16x28), so the
# denoiser in_channels (48->16), input_shape ([16,28]->[32,56]) and target-camera ray
# resolution ([128,224]->[256,448], so /patch8 = 32x56) change. Finetune from
# va-wan_dl3dv.ckpt with load_strict=false: transformer body loads, the now-mismatched
# latent in/out projections are reinitialized. Compressor (context VA-VAE side) unchanged.

defaults:
  - override /dataset: dl3dv
  - override /dataset/view_sampler: bounded
  - override /model/scheduler: rf
  - override /model/denoiser: lightningdit_L_1
  - override /model/autoencoders/context: va
  - override /model/autoencoders/target: wan2.1
  - override /model/compressor: mv_B1
  - override /model/compressor/camera: ray
  - override /model/compressor/camera/embedding: lvsm
  - override /model/denoiser/camera: ray
  - override /model/denoiser/camera/embedding: lvsm

dataset:
  root: ./DATA/DL3DV/DL3DV-960/DL3DV-10K
  smallset: false
  target_latent_type: wan

  context_shape: [256, 448]
  target_shape: [256, 448]

  # NOTE: Allow compatibility with va-wan, refer to docs/KNOWN_BUG.md
  scale_context_focal_by_256: true

  view_sampler:
    num_context_views: 16
    num_target_views: 10
    min_distance_between_context_views: 64
    max_distance_between_context_views: 96
    context_gap_warm_up_steps: 30_000
    target_gap_warm_up_steps: 30_000
    initial_min_distance_between_context_views: 48
    initial_max_distance_between_context_views: 64
    chunk_targets: false
    offset: 1

data_loader:
  train:
    batch_size: 8
  val:
    standard:
      shuffle: false
      batch_size: 4
      max_batches: 8
      num_workers: 4
      seed: 0
      interval: 5000
      persistent_workers: false
    unseen:
      shuffle: false
      batch_size: 4
      max_batches: 8
      num_workers: 4
      seed: 0
      interval: 5000
      persistent_workers: false
val:
  video_length: 34
  window_shift: 5
wandb:
  tags: [dl3dv, 256x448, va-wan2.1]

  activated: true

sampler:
  clean_targets: 5
freeze:
  denoiser: false
  compressor: false
model:

  scheduler:
    sampling_type: random_uniform
    num_inference_steps: 25
    kwargs:
      weighting: shifted
      timestep_shift: 4
  denoiser:
    ckpt_path: checkpoints/va-wan_dl3dv.ckpt # checkpoints/va-videodc_dl3dv.ckpt
    load_strict: false # Backward compatibility: only for provided checkpoints
    input_shape: [32, 56]
    gradient_checkpointing: true
    num_target_split: 1 # Split 3D RoPE to be applied independently per chunk
    camera:
      input_shape: [256, 448]
      embedding:
        patch_size: 8
        in_channels: 24
    kwargs:
      use_rope_3d: true
      in_channels: 16

  compressor:
    ckpt_path: checkpoints/va-wan_dl3dv.ckpt # checkpoints/va-videodc_dl3dv.ckpt
    load_strict: false # Backward compatibility: only for provided checkpoints
    kl_weights: [1e-10, 1e-10]
    input_shape: [16, 28]
    num_scene_tokens: 1024
    causal_self_atten: false
    gradient_checkpointing: true
    token_dim: 64
    init_large: true
    camera_conditioning: adaLN
    scene_token_projection: kl
    mask_context: false
    camera:
      input_shape: [128, 224]
      embedding:
        patch_size: 16
    kwargs:
      use_rope_2d: true
      use_rope_3d: false
      patch_size: 2


trainer:
  max_steps: 5_000_001
  val_check_interval: 5000
  task_steps: null
  accumulate_grad_batches: 1
  gradient_clip_val: 0.1

  precision: bf16-mixed

optimizer:
  name: AdamW
  lr: 1.0e-5

  scale_lr: false
  milestones: [2000]
  scheduler:
    - name: LinearLR
      frequency: 1
      interval: step
      kwargs:
        start_factor: 5.e-4
        total_iters: 2000

    - name: MultiStepLR
      frequency: 1
      interval: step
      kwargs:
        milestones: [500000]
        gamma: 0.8
