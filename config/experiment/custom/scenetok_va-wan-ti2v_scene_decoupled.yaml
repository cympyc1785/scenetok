# @package _global_
#
# Wan TI2V 5B + scene tokens + camera, trained on the CineScene **Scene-Decoupled
# Video Dataset** in DECOUPLED mode: context (scene tokens) = wohuman background,
# target (generated video) = whuman with-subject, text = foreground action only.
# Mirrors `scenetok_va-wan-ti2v_dynamicverse.yaml` but swaps the dataset to
# `scene_decoupled` and uses the `bounded` view sampler (this dataset has no
# caption-window prompt files; 81-frame clips, 7 trajectories/scene).
#
# scene_input_type / camera_input_type / lora.* are shell-side (see
# scripts/train_ti2v/train_ti2vgen_scene_decoupled_*.sh).

defaults:
  - override /dataset: scene_decoupled
  - override /dataset/view_sampler: bounded
  - override /model/scheduler: rf
  - override /model/denoiser: wan_ti2v_5b
  - override /model/autoencoders/context: va
  - override /model/autoencoders/target: wan
  - override /model/compressor: mv_B1
  - override /model/compressor/camera: ray
  - override /model/compressor/camera/embedding: lvsm

dataset:
  root: ./DATA/Scene-Decoupled-Video-dataset
  context_shape: [256, 448]
  target_shape: [480, 832]

  view_sampler:
    num_context_views: 12
    num_target_views: 10
    # Wan-VAE temporal_downsample=4, no 4N+1 chunk packing (clips are 81 frames).
    # V_pixel = 1 + (num_target_views-1)*td = 1 + 9*4 = 37 raw target frames.
    temporal_downsample: 4
    chunk_targets: false
    offset: 1
    min_distance_between_context_views: 8
    max_distance_between_context_views: 40
    initial_min_distance_between_context_views: 8
    initial_max_distance_between_context_views: 40

data_loader:
  train:
    batch_size: 4
  val:
    standard:
      shuffle: false
      batch_size: 8
      max_batches: 4
      num_workers: 2
      seed: 0
      interval: 5000
      persistent_workers: false
    unseen:
      shuffle: false
      batch_size: 8
      max_batches: 4
      num_workers: 2
      seed: 0
      interval: 5000
      persistent_workers: false

val:
  video_length: 37
  window_shift: 5

sampler:
  clean_targets: 5

freeze:
  denoiser: false
  compressor: true
  autoencoder: true

model:
  text_encoder: null

  scheduler:
    sampling_type: random_uniform
    num_inference_steps: 50
    kwargs:
      weighting: shifted
      timestep_shift: 8

  denoiser:
    name: wan_ti2v_5b
    model_root: src/model/DiffSynth-Studio/Wan2.2/Wan2.2-TI2V-5B
    dit_pattern: diffusion_pytorch_model*.safetensors
    text_encoder_path: null
    tokenizer_path: null
    seq_len: 512
    clean: whitespace
    gradient_checkpointing: true
    ac3d_num_layers: 2
    camera_context_spatial_pool: 16
    input_shape: [30, 52]
    num_target_split: 2
    ckpt_path: null
    load_strict: true
    camera:
      name: ray
      input_shape: [30, 52]
      normalize: false
      origin_first: false
      scale: [1.0, 1.0]
      embedding:
        name: time_embed
        in_channels: 6
        dropout_prob: 0.0
        fourier: true
        freq_origin: 15
        freq_direction: 15

  compressor:
    ckpt_path: checkpoints/va-wan_dl3dv_256x448.ckpt
    load_strict: false
    kl_weights: [0.0, 0.0]
    input_shape: [16, 28]
    num_scene_tokens: 1024
    causal_self_atten: false
    gradient_checkpointing: false
    token_dim: 64
    init_large: true
    camera_conditioning: adaLN
    scene_token_projection: kl
    mask_context: false
    camera:
      input_shape: [128, 224]
      embedding:
        patch_size: 16
    kwargs:
      use_rope_2d: true
      use_rope_3d: false
      patch_size: 2

trainer:
  max_steps: 5_000_001
  val_check_interval: 5000
  task_steps: null
  accumulate_grad_batches: 1
  gradient_clip_val: 0.1
  precision: bf16-mixed

optimizer:
  name: AdamW
  lr: 1.0e-4
  scale_lr: false
  milestones: [2000]
  scheduler:
    - name: LinearLR
      frequency: 1
      interval: step
      kwargs:
        start_factor: 5.e-4
        total_iters: 2000
