# @package _global_
#
# Structured (coarse/fine) scene latent — 256x448 context -> 480x832 target.
# Based on scenetok_va-wan_shift4_dl3dv_finetuned_wide, with:
#   - target 480x832 (denoiser input_shape [30,52], in_channels 48 for Wan2.2 VAE 16x spatial)
#   - compressor.structured_latent=true: scene tokens split into a COARSE group
#     (few tokens, attend to a downsampled context, stronger KL bottleneck) and a
#     FINE group (many tokens, full-res context, weak KL). num_scene_tokens =
#     num_coarse_tokens + num_fine_tokens (128 + 896 = 1024).
#   - group masking during training (both / coarse-only / fine-only) so each level is
#     independently usable and the two are complementary.

defaults:
  - override /dataset: dl3dv
  - override /dataset/view_sampler: bounded
  - override /model/scheduler: rf
  - override /model/denoiser: lightningdit_L_1
  - override /model/autoencoders/context: va
  - override /model/autoencoders/target: wan
  - override /model/compressor: mv_B1
  - override /model/compressor/camera: ray
  - override /model/compressor/camera/embedding: lvsm
  - override /model/denoiser/camera: ray
  - override /model/denoiser/camera/embedding: lvsm

dataset:
  root: ./DATA/DL3DV/DL3DV-960/DL3DV-10K
  smallset: false
  target_latent_type: wan

  context_shape: [256, 448]
  target_shape: [480, 832]

  # NOTE: Allow compatibility with va-wan, refer to docs/KNOWN_BUG.md
  scale_context_focal_by_256: true

  view_sampler:
    num_context_views: 16
    num_target_views: 10
    min_distance_between_context_views: 64
    max_distance_between_context_views: 96
    context_gap_warm_up_steps: 30_000
    target_gap_warm_up_steps: 30_000
    initial_min_distance_between_context_views: 48
    initial_max_distance_between_context_views: 64
    chunk_targets: false
    offset: 1

data_loader:
  train:
    batch_size: 8
  val:
    standard:
      shuffle: false
      batch_size: 4
      max_batches: 8
      num_workers: 4
      seed: 0
      interval: 5000
      persistent_workers: false
    unseen:
      shuffle: false
      batch_size: 4
      max_batches: 8
      num_workers: 4
      seed: 0
      interval: 5000
      persistent_workers: false
val:
  video_length: 34
  window_shift: 5
wandb:
  tags: [dl3dv, 256x448->480x832, structured_latent]

  activated: true

sampler:
  clean_targets: 5
freeze:
  denoiser: false
  compressor: false
model:

  scheduler:
    sampling_type: random_uniform
    num_inference_steps: 25
    kwargs:
      weighting: shifted
      timestep_shift: 4
  denoiser:
    ckpt_path: checkpoints/va-wan_dl3dv.ckpt # checkpoints/va-videodc_dl3dv.ckpt
    load_strict: false # Backward compatibility: only for provided checkpoints
    input_shape: [30, 52]            # 480x832 / 16 (Wan2.2 VAE)
    gradient_checkpointing: true
    num_target_split: 1 # Split 3D RoPE to be applied independently per chunk
    camera:
      input_shape: [240, 416]        # 30x52 grid * patch_size 8
      embedding:
        patch_size: 8
        in_channels: 24
    kwargs:
      use_rope_3d: true
      in_channels: 48

  compressor:
    ckpt_path: checkpoints/va-wan_dl3dv.ckpt # checkpoints/va-videodc_dl3dv.ckpt
    load_strict: false # Backward compatibility: only for provided checkpoints
    kl_schedule: [100000, 300000]
    kl_weights: [1e-10, 1e-6]
    input_shape: [16, 28]            # context 256x448 / 16 (VA-VAE)
    num_scene_tokens: 1024           # = num_coarse_tokens + num_fine_tokens
    causal_self_atten: false
    gradient_checkpointing: true
    token_dim: 64
    init_large: true
    camera_conditioning: adaLN
    scene_token_projection: kl
    mask_context: false
    # --- structured (coarse/fine) latent ---
    structured_latent: true
    num_coarse_tokens: 128
    num_fine_tokens: 896
    coarse_downsample: 2             # coarse queries attend to context pooled 2x (receptive-field asymmetry)
    coarse_kl_scale: 10.0            # stronger KL bottleneck on coarse (bottleneck asymmetry)
    fine_kl_scale: 1.0
    group_mask_enabled: true
    group_mask_probs: [0.5, 0.25, 0.25]   # [both, coarse_only, fine_only]
    camera:
      input_shape: [128, 224]
      embedding:
        patch_size: 16
    kwargs:
      use_rope_2d: true
      use_rope_3d: false
      patch_size: 2


trainer:
  max_steps: 5_000_001
  val_check_interval: 5000
  task_steps: null
  accumulate_grad_batches: 1
  gradient_clip_val: 0.1

  precision: bf16-mixed

optimizer:
  name: AdamW
  lr: 1.0e-5

  scale_lr: false
  milestones: [2000]
  scheduler:
    - name: LinearLR
      frequency: 1
      interval: step
      kwargs:
        start_factor: 5.e-4
        total_iters: 2000

    - name: MultiStepLR
      frequency: 1
      interval: step
      kwargs:
        milestones: [500000]
        gamma: 0.8
