# @package _global_
#
# Stage A: validate that frozen LagerNVS rec_tokens are a usable scene
# representation by reconstructing DL3DV novel views with the SceneTok
# lightningdit (rectified-flow) decoder. Only the compressor changes vs the
# SceneTok va-wan recon baseline (mv_B1 -> frozen LagerNVS, dense-direct):
# raw RGB context -> VGGT reconstructor -> dense rec_tokens (b, 16*777, 768)
# -> denoiser scene cross-attention (cnd_proj 768 -> inner). The denoiser is
# finetuned from the published va-wan_dl3dv decoder (cnd_proj re-init: cond_dim
# 64 -> 768 dropped by load_strict=false).
defaults:
  - override /dataset: dl3dv
  - override /dataset/view_sampler: bounded
  - override /model/scheduler: rf
  - override /model/denoiser: lightningdit_L_1
  - override /model/autoencoders/context: va
  - override /model/autoencoders/target: wan
  - override /model/compressor: lagernvs
  - override /model/denoiser/camera: ray
  - override /model/denoiser/camera/embedding: lvsm

dataset:
  root: ./DATA/DL3DV/DL3DV-960
  smallset: true        # Stage A overfit/dev subset
  target_latent_type: wan

  context_shape: [256, 448]
  target_shape: [256, 448]

  # NOTE: Allow compatibility with va-wan, refer to docs/KNOWN_BUG.md
  scale_context_focal_by_256: true

  view_sampler:
    num_context_views: 16
    num_target_views: 10
    min_distance_between_context_views: 64
    max_distance_between_context_views: 96
    context_gap_warm_up_steps: 30_000
    target_gap_warm_up_steps: 30_000
    initial_min_distance_between_context_views: 48
    initial_max_distance_between_context_views: 64
    chunk_targets: false
    offset: 1

data_loader:
  train:
    batch_size: 2
  val:
    standard:
      shuffle: false
      batch_size: 2
      max_batches: 4
      num_workers: 4
      seed: 0
      interval: 5000
      persistent_workers: false
    unseen:
      shuffle: false
      batch_size: 2
      max_batches: 4
      num_workers: 4
      seed: 0
      interval: 5000
      persistent_workers: false
val:
  video_length: 34
  window_shift: 5
wandb:
  tags: [dl3dv, lagernvs, stage_a, 256x448]
  activated: true

sampler:
  clean_targets: 5

freeze:
  denoiser: false
  compressor: true        # LagerNVS reconstructor stays frozen (paper recipe)

model:
  scheduler:
    sampling_type: random_uniform
    num_inference_steps: 25
    kwargs:
      weighting: shifted
      timestep_shift: 4
  denoiser:
    ckpt_path: checkpoints/va-wan_dl3dv.ckpt
    load_strict: false      # cnd_proj cond_dim 64 -> 768 dropped & re-init
    input_shape: [16, 28]
    gradient_checkpointing: true
    num_target_split: 1
    camera:
      input_shape: [128, 224]
      embedding:
        patch_size: 8
        in_channels: 24
    kwargs:
      use_rope_3d: true
      in_channels: 48

trainer:
  max_steps: 5_000_001
  val_check_interval: 5000
  task_steps: null
  accumulate_grad_batches: 1
  gradient_clip_val: 0.1

  precision: bf16-mixed

optimizer:
  name: AdamW
  lr: 1.0e-5

  scale_lr: false
  milestones: [2000]
  scheduler:
    - name: LinearLR
      frequency: 1
      interval: step
      kwargs:
        start_factor: 5.e-4
        total_iters: 2000

    - name: MultiStepLR
      frequency: 1
      interval: step
      kwargs:
        milestones: [500000]
        gamma: 0.8
